<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سير السلف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- الرأس والشعار -->
    <header class="bg-emerald-700 text-white p-8 text-center shadow-lg">
        <h1 class="text-4xl font-bold">سير السلف</h1>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <!-- صندوق البحث والفلترة -->
        <div class="flex gap-2 mb-8 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <input type="text" id="searchInput" placeholder="ابحث بالاسم..." class="flex-grow p-2 outline-none">
            <select id="genFilter" class="bg-slate-100 p-2 rounded text-slate-600 outline-none">
                <option value="">كل الأجيال</option>
                <option value="الأول">الجيل الأول</option>
                <option value="الثاني">الجيل الثاني</option>
            </select>
        </div>

        <!-- زر إضافة سيرة -->
        <button onclick="toggleModal(true)" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg mb-6 shadow-md transition">
            + إضافة سيرة
        </button>

        <!-- حاوية البطاقات -->
        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <!-- نافذة الإضافة (Modal) -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
        <form id="addCharForm" class="bg-white p-6 rounded-2xl w-full max-w-lg relative max-h-[90vh] overflow-y-auto">
            <button type="button" onclick="toggleModal(false)" class="absolute top-4 left-4 text-gray-400 hover:text-red-500 font-bold text-xl">X</button>
            <h2 class="text-2xl font-bold mb-4 text-emerald-800">إضافة شخصية جديدة</h2>
            
            <input type="text" id="name" placeholder="الاسم (إجباري)" class="w-full p-2 border rounded mb-3" required>
            <input type="text" id="generation" placeholder="الجيل" class="w-full p-2 border rounded mb-3">
            <div class="grid grid-cols-2 gap-2 mb-3">
                <input type="text" id="birth_year" placeholder="سنة الولادة" class="p-2 border rounded">
                <input type="text" id="death_year" placeholder="سنة الوفاة" class="p-2 border rounded">
            </div>
            <input type="text" id="works" placeholder="المؤلفات" class="w-full p-2 border rounded mb-3">
            <input type="text" id="field_of_study" placeholder="العلم المسند" class="w-full p-2 border rounded mb-3">
            <textarea id="description" placeholder="الشرح" class="w-full p-2 border rounded mb-3 h-24"></textarea>
            <input type="text" id="notes" placeholder="الملاحظات" class="w-full p-2 border rounded mb-3">
            <input type="text" id="fame" placeholder="الشهرة" class="w-full p-2 border rounded mb-4">
            
            <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700">حفظ الشخصية</button>
        </form>
    </div>

    <script>
        const supabaseUrl = 'https://flwszpkrwgybibnarkvz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsd3N6cGtyd2d5YmlibmFya3Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMjMzMjEsImV4cCI6MjA5ODg5OTMyMX0.XJql__Y7e06j337mLCRduBf3tuVdlkB3Lv43H4xyN3E';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function toggleModal(show) {
            document.getElementById('modal').classList.toggle('hidden', !show);
        }

        async function loadCharacters() {
            const { data } = await supabase.from('sear').select('*');
            const container = document.getElementById('cardsContainer');
            container.innerHTML = data.map(c => `
                <div class="bg-white p-5 rounded-xl border-r-4 border-emerald-500 shadow-sm hover:shadow-md transition">
                    <h2 class="text-xl font-bold text-emerald-900">${c.name}</h2>
                    <p class="text-xs text-slate-400 mt-1">${c.generation || ''} | ${c.birth_year || ''} - ${c.death_year || ''}</p>
                    <p class="mt-3 text-slate-700 text-sm">${c.description || ''}</p>
                </div>
            `).join('');
        }

        document.getElementById('addCharForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabase.from('sear').insert([{
                name: document.getElementById('name').value,
                generation: document.getElementById('generation').value,
                birth_year: document.getElementById('birth_year').value,
                death_year: document.getElementById('death_year').value,
                works: document.getElementById('works').value,
                field_of_study: document.getElementById('field_of_study').value,
                description: document.getElementById('description').value,
                notes: document.getElementById('notes').value,
                fame: document.getElementById('fame').value
            }]);

            if (error) alert('خطأ: ' + error.message);
            else {
                toggleModal(false);
                document.getElementById('addCharForm').reset();
                loadCharacters();
            }
        });

        loadCharacters();
    </script>
</body>
</html>
