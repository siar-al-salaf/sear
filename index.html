<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سير السلف - نظام التصحيح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-10 text-center">
    <h1 class="text-2xl font-bold mb-4">جاري فحص الاتصال بقاعدة البيانات...</h1>
    <div id="status" class="text-red-600 font-bold"></div>

    <script>
        const supabaseUrl = 'https://flwszpkrwgybibnarkvz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsd3N6cGtyd2d5YmlibmFya3Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMjMzMjEsImV4cCI6MjA5ODg5OTMyMX0.XJql__Y7e06j337mLCRduBf3tuVdlkB3Lv43H4xyN3E';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function checkConnection() {
            // نحاول إرسال بيانات تجريبية وهمية لنرى الخطأ
            const { error } = await supabase.from('sear').insert([{ name: 'اختبار' }]);
            
            if (error) {
                document.getElementById('status').innerHTML = 
                    "الخطأ الذي يمنع الحفظ هو: <br><br>" + error.message + 
                    "<br><br> التفاصيل: " + error.details + 
                    "<br><br> تلميح: " + error.hint;
            } else {
                document.getElementById('status').classList.remove('text-red-600');
                document.getElementById('status').classList.add('text-green-600');
                document.getElementById('status').innerText = "تم الحفظ بنجاح! الاتصال سليم، المشكلة كانت في شيء آخر.";
            }
        }
        checkConnection();
    </script>
</body>
</html>
